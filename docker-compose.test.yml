  # Postgres 17 (Latest Stable)
  postgres-17:
    image: postgres:17-alpine
    container_name: dbm-test-pg-17
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
    ports:
      - "54417:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # MongoDB Family
  # ==========================================

  # MongoDB 4.4 (Older Legacy)
  mongo-4:
    image: mongo:4.4
    platform: linux/amd64
    container_name: dbm-test-mongo-4
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: testdb
    ports:
      - "27704:27017"
    volumes:
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  # MongoDB 5.0 - disabled to reduce RAM usage, re-enable if needed
  # mongo-5:
  #   image: mongo:5.0
  #   container_name: dbm-test-mongo-5
  #   environment:
