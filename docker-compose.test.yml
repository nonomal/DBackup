  #     MONGO_INITDB_DATABASE: testdb
  #   ports:
  #     - "27707:27017"
  #   volumes:
  #     - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
  #   healthcheck:
  #     test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
  #     interval: 10s
  #     timeout: 10s
  #     retries: 5

  # MongoDB 8.0 (Latest)
  mongo-8:
    image: mongo:8.0
    container_name: dbm-test-mongo-8
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: testdb
    ports:
      - "27708:27017"
    volumes:
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  # ==========================================
  # Microsoft SQL Server Family
  # ==========================================

  # MSSQL 2019 (LTS)
  # Platform: linux/amd64 required (no ARM support)
  mssql-2019:
    image: mcr.microsoft.com/mssql/server:2019-latest
    platform: linux/amd64
    container_name: dbm-test-mssql-2019
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Express"
    ports:
      - "14339:1433"
    volumes:
      - /tmp:/var/opt/mssql/backup
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # MSSQL 2022 (Latest LTS)
  # Platform: linux/amd64 required (no ARM support)
  mssql-2022:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: dbm-test-mssql-2022
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Express"
    ports:
      - "14342:1433"
    volumes:
      - /tmp:/var/opt/mssql/backup
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -Q "SELECT 1" -b -o /dev/null -C
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Azure SQL Edge (ARM64 compatible - for M1/M2 Macs) - disabled to reduce RAM usage, re-enable if needed
  # mssql-edge:
