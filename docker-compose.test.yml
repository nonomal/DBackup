  #     timeout: 5s
  #     retries: 10
  #     start_period: 30s

  # ==========================================
  # Redis Family
  # ==========================================

  # Redis 6 (LTS with ACL support)
  redis-6:
    image: redis:6-alpine
    container_name: dbm-test-redis-6
    command: redis-server --requirepass testpassword
    ports:
      - "63796:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "testpassword", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 7 (Previous Stable) - disabled to reduce RAM usage, re-enable if needed
  # redis-7:
  #   image: redis:7-alpine
  #   container_name: dbm-test-redis-7
  #   command: redis-server --requirepass testpassword
