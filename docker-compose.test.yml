  #   healthcheck:
  #     test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
  #     interval: 10s
  #     timeout: 10s
  #     retries: 5

  # MongoDB 7.0 - disabled to reduce RAM usage, re-enable if needed
  # mongo-7:
  #   image: mongo:7.0
  #   container_name: dbm-test-mongo-7
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: root
